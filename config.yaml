# ============ GENEL ============
language: "tr"
topics_file: "topics.txt"
format: "vertical"                 # vertical (9:16) | horizontal

# ============ SENARYO (Claude API) ============
script:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  max_tokens: 3000
  target_seconds: 55
  style: >
    Ilk 2 saniyede sok edici/merak uyandiran bir hook. Hizli tempo, kisa
    cumleler, tek bir net fikir. Sonunda takip etmeye tesvik eden kapanis.
    Ozgun bir bakis acisi kat - jenerik metin kabul edilemez.

# ============ SESLENDIRME ============
tts:
  provider: "elevenlabs"           # elevenlabs (gercek insan sesine en yakin) | edge (ucretsiz yedek)
  elevenlabs:
    # ELEVENLABS_API_KEY ortam degiskeninden okunur
    voice_id: "ErXwobaYiN019PkySvjV"   # ornek: dogal Turkce erkek ses - elevenlabs.io/voice-library'den begendiginizi secin
    model_id: "eleven_multilingual_v2"
    stability: 0.5                     # dusuk = daha duygusal/dogal, yuksek = daha tutarli
    similarity_boost: 0.8
    style: 0.3
  voice_tr: "tr-TR-AhmetNeural"    # edge yedegi icin
  voice_en: "en-US-GuyNeural"
  rate: "+10%"

# ============ GORSEL ============
visuals:
  provider: "replicate"            # replicate (AI, ozgun sinematik gorsel) | pexels (stok) | local
  replicate:
    # REPLICATE_API_TOKEN ortam degiskeninden okunur
    model: "black-forest-labs/flux-schnell"   # hizli+ucuz; daha yuksek kalite: black-forest-labs/flux-1.1-pro
    per_video: 6                   # video basina uretilecek gorsel sayisi
    style_suffix: "cinematic, dramatic lighting, high detail, photorealistic, no text, no watermark"

stock:                             # visuals.provider: pexels secilirse
  provider: "pexels"
  per_topic: 5
  orientation: "portrait"

# ============ VIDEO ============
video:
  resolution_vertical: "1080x1920"
  resolution_horizontal: "1920x1080"
  fps: 30
  assets_dir: "assets"
  subtitle: true
  captions:                        # kelime-kelime senkron altyazi stili
    size: 96
    outline: 5
    position: 0.30                 # alttan oran (0.30 = ekranin alt %30'u)
    font: "DejaVu Sans"
  bg_music: ""
  bg_music_volume: 0.08

# ============ KAPAK ============
thumbnail:
  bg_color: "#101827"
  text_color: "#FFD43B"
  font: ""

# ============ YOUTUBE ============
youtube:
  client_secrets: "client_secret.json"
  token_file: "token.json"
  privacy: "private"
  category_id: "27"
  made_for_kids: false
  ai_disclosure: true
